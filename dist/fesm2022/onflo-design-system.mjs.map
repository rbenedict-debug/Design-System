<ng-container [ngSwitch]="variant">
  <!-- Subhead variant — no Material equivalent, stays custom -->
  <div
    *ngSwitchCase="'subhead'"
    class="ds-divider ds-divider--subhead"
    role="separator"
  >
    <span *ngIf="label" class="ds-divider__label">{{ label }}</span>
  </div>

  <!-- Middle-inset — no Material equivalent, stays custom -->
  <hr *ngSwitchCase="'middle-inset'" class="ds-divider ds-divider--middle-inset" role="separator" />

  <!-- Vertical inset -->
  <mat-divider *ngSwitchCase="'vertical-inset'" [vertical]="true" [inset]="true"></mat-divider>

  <!-- Vertical -->
  <mat-divider *ngSwitchCase="'vertical'" [vertical]="true"></mat-divider>

  <!-- Horizontal inset -->
  <mat-divider *ngSwitchCase="'inset'" [inset]="true"></mat-divider>

  <!-- Default: horizontal full -->
  <mat-divider *ngSwitchDefault></mat-divider>
</ng-container>
