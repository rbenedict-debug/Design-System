<!-- External label — sits above the mat-form-field, not floating inside it -->
<label *ngIf="label" class="ds-textarea__label" [for]="textareaId">
  {{ label }}<span *ngIf="required" class="ds-textarea__required" aria-hidden="true">*</span>
</label>

<!-- mat-form-field owns the field box, border, and matInput textarea -->
<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
  class="ds-textarea__field-wrapper"
>
  <textarea
    matInput
    [id]="textareaId"
    [placeholder]="placeholder"
    [rows]="rows"
    [disabled]="disabled"
    [readonly]="readOnly"
    [required]="required"
    [attr.aria-invalid]="isError ? 'true' : null"
    [attr.aria-describedby]="(helperText || errorText) ? textareaId + '-helper' : null"
    (input)="onInput($event)"
  >{{ value }}</textarea>
</mat-form-field>

<!-- Helper / error text — external, below the field -->
<span
  *ngIf="(isError && errorText) || helperText"
  class="ds-textarea__helper"
  [id]="textareaId + '-helper'"
  [attr.role]="isError ? 'alert' : null"
>{{ isError && errorText ? errorText : helperText }}</span>
