<div
  class="ds-table-header-cell"
  [class.ds-table-header-cell--right]="align === 'right'"
  [class.ds-table-header-cell--checkbox-only]="isCheckboxOnly"
>

  <!-- Left resize handle -->
  <div class="ds-table-header-cell__resize-handle">
    <span *ngIf="showLeftPipe" class="ds-table-header-cell__resize-bar"></span>
  </div>

  <!-- Content: checkbox · label · sort button -->
  <div
    class="ds-table-header-cell__content"
    [class.ds-table-header-cell__content--right]="align === 'right'"
  >
    <!-- Select-all checkbox -->
    <div
      *ngIf="checkbox"
      class="ds-table-header-cell__checkbox"
      [class]="checkboxClass"
      role="checkbox"
      [attr.aria-checked]="indeterminate ? 'mixed' : checked"
      tabindex="0"
      (click)="onCheckboxClick()"
      (keydown.enter)="onCheckboxClick()"
      (keydown.space)="$event.preventDefault(); onCheckboxClick()"
    >
      <span class="ds-icon" [class.ds-icon--filled]="checked || indeterminate">
        {{ checkboxIcon }}
      </span>
    </div>

    <!-- Column label -->
    <span *ngIf="label" class="ds-table-header-cell__label">{{ label }}</span>

    <!-- Sort button — always rendered for sortable columns; opacity 0 until hovered when unsorted -->
    <ds-icon-button
      *ngIf="sorting"
      size="sm"
      variant="icon"
      [ariaLabel]="sortAriaLabel"
      (clicked)="onSortClick($event)"
    >
      <span class="ds-icon" [ngClass]="sortIconClass">arrow_upward_alt</span>
    </ds-icon-button>
  </div>

  <!-- Trailing actions: menu · filter · right resize handle -->
  <div class="ds-table-header-cell__actions">

    <!-- Column menu button -->
    <div #menuBtnEl *ngIf="menuControl">
      <ds-icon-button
        size="sm"
        variant="icon"
        ariaLabel="Column options"
        (clicked)="onMenuClick(menuBtnEl)"
      >
        <span class="ds-icon ds-table-header-cell__menu-icon">more_vert</span>
      </ds-icon-button>
    </div>

    <!-- Filter button (filled icon) — active state when a filter is live -->
    <div #filterBtnEl *ngIf="filtering">
      <ds-icon-button
        size="sm"
        variant="icon"
        [ariaLabel]="filterActive ? 'Filter active — click to edit' : 'Filter column'"
        (clicked)="onFilterClick(filterBtnEl)"
      >
        <span
          class="ds-icon ds-icon--filled"
          [class.ds-table-header-cell__filter-icon--active]="filterActive"
        >filter_alt</span>
      </ds-icon-button>
    </div>

    <!-- Right resize handle — drag to resize, double-click to auto-size -->
    <div
      class="ds-table-header-cell__resize-handle ds-table-header-cell__resize-handle--trailing"
      [class.ds-table-header-cell__resize-handle--active]="showRightPipe"
      (mousedown)="onResizeStart($event)"
      (dblclick)="onResizeDblClick($event)"
    >
      <span *ngIf="showRightPipe" class="ds-table-header-cell__resize-bar"></span>
    </div>

  </div>

</div>
