<div class="ds-table-toolbar">

  <!-- Left panel — action buttons (hidden when showActions is false) -->
  <div class="ds-table-toolbar__left" *ngIf="showActions">
    <ng-content select="[toolbar-actions]"></ng-content>
  </div>

  <!-- Right panel — search, optional extras, fixed icon buttons -->
  <div class="ds-table-toolbar__right">

    <!-- Search field — grows to fill available space -->
    <ds-search
      [placeholder]="searchPlaceholder"
      [ariaLabel]="searchAriaLabel"
      [value]="searchValue"
      (valueChange)="onSearchValueChange($event)"
      (search)="search.emit($event)"
    ></ds-search>

    <!-- Optional slot: extra filter chips, dropdowns, or buttons between search and icon buttons -->
    <ng-content select="[toolbar-extra]"></ng-content>

    <!-- Filter toggle button — always present -->
    <ds-icon-button-toggle
      variant="outlined"
      [selected]="filterActive"
      (selectedChange)="onFilterSelectedChange($event)"
      ariaLabel="Toggle filters"
    >
      <span class="ds-icon ds-icon--filled">filter_alt</span>
    </ds-icon-button-toggle>

    <!-- Settings / column visibility toggle — always present -->
    <ds-icon-button-toggle
      variant="outlined"
      [selected]="settingsActive"
      (selectedChange)="onSettingsSelectedChange($event)"
      ariaLabel="Column settings"
    >
      <span class="ds-icon ds-icon--filled">settings</span>
    </ds-icon-button-toggle>

    <!-- Download button — shown by default, hide with [showDownload]="false" -->
    <ds-icon-button
      *ngIf="showDownload"
      variant="outlined"
      ariaLabel="Download"
      (clicked)="downloadClick.emit()"
    >
      <span class="ds-icon">download</span>
    </ds-icon-button>

    <!-- Optional slot: trailing action buttons (replaces or supplements download) -->
    <ng-content select="[toolbar-trailing]"></ng-content>

  </div>

</div>
