<!-- External label — sits above the mat-form-field, not floating inside it -->
<label *ngIf="label" class="ds-input__label" [for]="inputId">
  {{ label }}<span *ngIf="required" class="ds-input__required" aria-hidden="true">*</span>
</label>

<!-- mat-form-field owns the field box, border, prefix/suffix slots, and matInput -->
<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
  class="ds-input__field-wrapper"
>

  <!-- Leading icon -->
  <span *ngIf="leadingIcon" matPrefix
    class="ds-icon ds-icon--sm ds-input__icon" aria-hidden="true">{{ leadingIcon }}</span>

  <!-- Prefix text -->
  <span *ngIf="prefix" matPrefix
    class="ds-input__prefix" aria-hidden="true">{{ prefix }}</span>

  <!-- Input control -->
  <input
    matInput
    [id]="inputId"
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    [readonly]="readOnly"
    [required]="required"
    [attr.aria-invalid]="isError ? 'true' : null"
    [attr.aria-describedby]="(helperText || errorText) ? inputId + '-helper' : null"
    (input)="onInput($event)"
  />

  <!-- Suffix text -->
  <span *ngIf="suffix" matSuffix
    class="ds-input__suffix" aria-hidden="true">{{ suffix }}</span>

  <!-- Error icon — replaces trailing action in error state -->
  <span *ngIf="isError && !disabled" matSuffix
    class="ds-icon ds-icon--sm ds-icon--filled ds-input__error-icon" aria-hidden="true">error</span>

  <!-- Trailing action button (clear, show/hide, etc.) -->
  <button *ngIf="trailingIcon && !disabled && !isError" matSuffix
    class="ds-input__action" type="button"
    [attr.aria-label]="'Clear ' + label"
    (click)="onTrailingAction()">
    <span class="ds-icon ds-icon--sm" aria-hidden="true">{{ trailingIcon }}</span>
  </button>

  <!-- Trailing icon — decorative only when disabled -->
  <span *ngIf="trailingIcon && disabled" matSuffix
    class="ds-icon ds-icon--sm ds-input__icon" aria-hidden="true">{{ trailingIcon }}</span>

</mat-form-field>

<!-- Helper / error text — external, below the field -->
<span
  *ngIf="(isError && errorText) || helperText"
  class="ds-input__helper"
  [id]="inputId + '-helper'"
  [attr.role]="isError ? 'alert' : null"
>{{ isError && errorText ? errorText : helperText }}</span>
