<!-- External label — sits above the mat-form-field, not floating inside it -->
<label *ngIf="label" class="ds-autocomplete__label" [for]="selectId">
  {{ label }}<span *ngIf="required" class="ds-autocomplete__required" aria-hidden="true">*</span>
</label>

<!-- mat-form-field owns the field box and border (same visual as ds-input) -->
<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
  class="ds-autocomplete__field-wrapper"
>
  <input
    matInput
    [id]="selectId"
    [matAutocomplete]="panel"
    [value]="value"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [readonly]="readonly"
    [required]="required"
    [attr.aria-invalid]="isError ? 'true' : null"
    [attr.aria-describedby]="(helperText || errorText) ? selectId + '-helper' : null"
    autocomplete="off"
    (input)="onInput($event)"
  >

  <!-- Arrow icon — always shown except in error state -->
  <span *ngIf="!isError" matSuffix
    class="ds-icon ds-icon--sm ds-autocomplete__arrow" aria-hidden="true">arrow_drop_down</span>

  <!-- Error icon — replaces arrow in error state -->
  <span *ngIf="isError && !disabled" matSuffix
    class="ds-icon ds-icon--sm ds-icon--filled ds-autocomplete__error-icon" aria-hidden="true">error</span>

</mat-form-field>

<!-- Helper / error text — external, below the field -->
<span
  *ngIf="(isError && errorText) || helperText"
  class="ds-autocomplete__helper"
  [id]="selectId + '-helper'"
  [attr.role]="isError ? 'alert' : null"
>{{ isError && errorText ? errorText : helperText }}</span>
