<!-- External label — sits above the mat-form-field, not floating inside it -->
<label *ngIf="label" class="ds-select__label" [for]="selectId">
  {{ label }}<span *ngIf="required" class="ds-select__required" aria-hidden="true">*</span>
</label>

<!-- mat-form-field owns the field box and border (same visual as ds-input) -->
<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
  class="ds-select__field-wrapper"
>
  <!-- mat-select provides role="listbox", keyboard nav, and screen reader announcements -->
  <mat-select
    [id]="selectId"
    [value]="value"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [required]="required"
    panelClass="ds-select__panel"
    [attr.aria-invalid]="isError ? 'true' : null"
    [attr.aria-describedby]="(helperText || errorText) ? selectId + '-helper' : null"
    (selectionChange)="onSelectionChange($event)"
  >
    <mat-option
      *ngFor="let opt of options"
      [value]="opt.value"
      [disabled]="opt.disabled ?? false"
    >{{ opt.label }}</mat-option>
  </mat-select>

  <!-- Arrow icon — hidden in error state via is-error host class -->
  <span *ngIf="!isError" matSuffix
    class="ds-icon ds-icon--sm ds-select__arrow" aria-hidden="true">arrow_drop_down</span>

  <!-- Error icon — replaces arrow in error state -->
  <span *ngIf="isError && !disabled" matSuffix
    class="ds-icon ds-icon--sm ds-icon--filled ds-select__error-icon" aria-hidden="true">error</span>

</mat-form-field>

<!-- Helper / error text — external, below the field -->
<span
  *ngIf="(isError && errorText) || helperText"
  class="ds-select__helper"
  [id]="selectId + '-helper'"
  [attr.role]="isError ? 'alert' : null"
>{{ isError && errorText ? errorText : helperText }}</span>
