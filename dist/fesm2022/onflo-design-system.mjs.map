<div
  class="ds-nav-tab"
  [class.is-active]="active"
  [class.ds-nav-tab--more]="more"
  role="button"
  tabindex="0"
  [attr.aria-pressed]="more ? null : active"
  [attr.aria-label]="more ? 'More tabs' : label + (active ? ' tab — active' : ' tab')"
  (click)="onTabClick()"
  (keydown.enter)="onTabClick()"
  (keydown.space)="$event.preventDefault(); onTabClick()"
>
  <div class="ds-nav-tab__content">
    @if (more) {
      <span class="ds-nav-tab__label">...</span>
    } @else {
      <span class="ds-nav-tab__label">{{ label }}</span>
      <button
        class="ds-nav-tab__close"
        type="button"
        [attr.aria-label]="'Close ' + label + ' tab'"
        (click)="onCloseClick($event)"
      >
        <span class="ds-icon ds-icon--xs" aria-hidden="true">close_small</span>
      </button>
    }
  </div>
</div>
