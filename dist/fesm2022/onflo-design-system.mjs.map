<!-- ds-search is a variant of ds-input — the host carries both classes.
     Use ds-input__* classes throughout so ds-input styles apply without duplication. -->

<div class="ds-input__field">

  <!-- Leading search icon — decorative, non-interactive -->
  <span *ngIf="leadingIcon" class="ds-icon ds-icon--sm ds-input__icon" aria-hidden="true">search</span>

  <!-- Input control -->
  <input
    class="ds-input__control"
    type="search"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel"
    autocomplete="off"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  />

  <!-- Clear button — visible only when the field has a value -->
  <button
    *ngIf="hasValue && !disabled"
    class="ds-input__action"
    type="button"
    aria-label="Clear search"
    (click)="onClear()"
  >
    <span class="ds-icon ds-icon--sm" aria-hidden="true">close</span>
  </button>

</div>
