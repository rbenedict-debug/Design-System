<mat-checkbox
  class="ds-checkbox"
  [class.is-error]="isError"
  [checked]="checked"
  [indeterminate]="indeterminate"
  [disabled]="disabled"
  [disableRipple]="true"
  (change)="onChange($event)"
>
  <span *ngIf="label" class="ds-checkbox__label">{{ label }}</span>
  <ng-content></ng-content>
</mat-checkbox>
