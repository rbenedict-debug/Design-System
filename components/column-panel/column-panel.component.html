<div class="ds-column-panel">

  <!-- ── 1. Density toggle ───────────────────────────────────────── -->
  <div class="ds-column-panel__density">
    <div class="ds-button-group" role="group" aria-label="Row density">
      <button
        type="button"
        class="ds-button ds-button--outlined ds-button--sm ds-button--leading-icon"
        [class.is-selected]="density === 'comfort'"
        [attr.aria-pressed]="density === 'comfort'"
        (click)="onDensityChange('comfort')"
      >
        <span class="ds-icon ds-icon--sm" aria-hidden="true">density_medium</span>
        Comfort
      </button>
      <button
        type="button"
        class="ds-button ds-button--outlined ds-button--sm ds-button--leading-icon"
        [class.is-selected]="density === 'compact'"
        [attr.aria-pressed]="density === 'compact'"
        (click)="onDensityChange('compact')"
      >
        <span class="ds-icon ds-icon--sm" aria-hidden="true">density_small</span>
        Compact
      </button>
    </div>
  </div>

  <!-- ── 2. Column Visibility ─────────────────────────────────────── -->
  <button
    type="button"
    class="ds-column-panel__section-hd"
    [attr.aria-expanded]="colVisibilityExpanded"
    (click)="toggleColVisibility()"
  >
    <span class="ds-icon ds-icon--filled ds-column-panel__section-icon" aria-hidden="true">visibility</span>
    <span class="ds-column-panel__section-title">Column Visibility</span>
    <span class="ds-icon ds-icon--sm ds-column-panel__expand-icon" aria-hidden="true">arrow_drop_down</span>
  </button>

  <div class="ds-column-panel__col-list">
    <div
      *ngFor="let col of columns; let i = index"
      class="ds-column-panel__col-row"
      [class.ds-column-panel__col-row--system]="col.system"
      [attr.draggable]="col.system ? null : 'true'"
      (dragstart)="onDragStart($event, i)"
      (dragover)="onDragOver($event)"
      (drop)="onDrop($event, i)"
    >
      <!-- Visibility checkbox -->
      <div
        class="ds-column-panel__col-checkbox"
        [class]="checkboxClass(col)"
        role="checkbox"
        [attr.aria-checked]="col.visible"
        [attr.aria-label]="'Toggle ' + col.label + ' visibility'"
        [attr.tabindex]="col.system ? -1 : 0"
        (click)="toggleColumnVisibility(col)"
        (keydown.space)="$event.preventDefault(); toggleColumnVisibility(col)"
        (keydown.enter)="toggleColumnVisibility(col)"
      >
        <span
          class="ds-icon ds-icon--sm"
          [class.ds-icon--filled]="col.visible"
          aria-hidden="true"
        >{{ checkboxIcon(col) }}</span>
      </div>

      <!-- Drag handle -->
      <span
        *ngIf="!col.system"
        class="ds-icon ds-icon--sm ds-column-panel__col-drag"
        aria-hidden="true"
      >drag_indicator</span>

      <!-- Column label -->
      <span class="ds-column-panel__col-name">{{ col.label }}</span>
    </div>
  </div>

  <!-- ── 3. Pivot Mode (optional — hidden by suppressPivotMode) ──────── -->
  <ng-container *ngIf="!suppressPivotMode">
    <div class="ds-divider" role="separator" aria-hidden="true"></div>
    <div class="ds-column-panel__pivot-row">
      <label class="ds-toggle" aria-label="Enable pivot mode">
        <input
          type="checkbox"
          class="ds-toggle__control"
          [checked]="pivotMode"
          (change)="togglePivotMode()"
        />
        <span class="ds-toggle__track"><span class="ds-toggle__thumb"></span></span>
      </label>
      <span class="ds-column-panel__pivot-label">Pivot Mode</span>
    </div>

    <!-- Column Labels (shown when pivot mode is active) -->
    <ng-container *ngIf="pivotMode">
      <div class="ds-column-panel__section-hd">
        <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">view_column</span>
        <span class="ds-column-panel__section-title">Column Labels</span>
      </div>

      <div class="ds-column-panel__pivot-col-list">
        <div
          *ngFor="let col of activePivotColumns"
          class="ds-column-panel__pivot-col-row"
        >
          <span class="ds-icon ds-icon--sm ds-column-panel__col-drag" aria-hidden="true">drag_indicator</span>
          <span class="ds-column-panel__col-name">{{ col.label }}</span>
          <button
            type="button"
            class="ds-column-panel__pivot-remove"
            [attr.aria-label]="'Remove ' + col.label + ' pivot column'"
            (click)="removePivotColumn(col.colId)"
          >
            <span class="ds-icon ds-icon--sm" aria-hidden="true">do_not_disturb_on</span>
          </button>
        </div>
      </div>

      <button
        type="button"
        class="ds-column-panel__add-btn"
        [attr.aria-expanded]="showPivotMenu"
        (click)="togglePivotMenu($event)"
      >
        <span class="ds-icon ds-icon--sm" aria-hidden="true">add_circle_outline</span>
        Add Column
      </button>

      <div
        *ngIf="showPivotMenu"
        class="ds-menu ds-column-panel__picker"
        role="menu"
        (click)="$event.stopPropagation()"
      >
        <ng-container *ngIf="pivotMenuOptions.length > 0; else noPivotCols">
          <button
            *ngFor="let opt of pivotMenuOptions"
            type="button"
            class="ds-menu__item"
            role="menuitem"
            (click)="selectPivotColumn(opt, $event)"
          >{{ opt.label }}</button>
        </ng-container>
        <ng-template #noPivotCols>
          <span class="ds-column-panel__picker-empty">All columns added</span>
        </ng-template>
      </div>
    </ng-container>
  </ng-container>

  <!-- ── 4. Row Groups (optional — hidden by suppressRowGroups) ──────── -->
  <ng-container *ngIf="!suppressRowGroups">
    <div class="ds-divider" role="separator" aria-hidden="true"></div>
    <div class="ds-column-panel__section-hd">
      <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">cell_merge</span>
      <span class="ds-column-panel__section-title">Row Groups</span>
    </div>

    <!-- Active row group rows -->
    <div
      *ngIf="activeRowGroups.length > 0"
      class="ds-column-panel__pivot-col-list"
    >
      <div
        *ngFor="let group of activeRowGroups"
        class="ds-column-panel__pivot-col-row"
      >
        <span class="ds-icon ds-icon--sm ds-column-panel__col-drag" aria-hidden="true">drag_indicator</span>
        <span class="ds-column-panel__col-name">{{ group.label }}</span>
        <button
          type="button"
          class="ds-column-panel__pivot-remove"
          [attr.aria-label]="'Remove ' + group.label + ' row group'"
          (click)="removeRowGroupColumn(group.colId)"
        >
          <span class="ds-icon ds-icon--sm" aria-hidden="true">do_not_disturb_on</span>
        </button>
      </div>
    </div>

    <!-- Add Column button + inline picker -->
    <button
      type="button"
      class="ds-column-panel__add-btn"
      [attr.aria-expanded]="showRowGroupMenu"
      (click)="toggleRowGroupMenu($event)"
    >
      <span class="ds-icon ds-icon--sm" aria-hidden="true">add_circle_outline</span>
      Add Column
    </button>

    <div
      *ngIf="showRowGroupMenu"
      class="ds-menu ds-column-panel__picker"
      role="menu"
      (click)="$event.stopPropagation()"
    >
      <ng-container *ngIf="rowGroupMenuOptions.length > 0; else noRowGroupCols">
        <button
          *ngFor="let opt of rowGroupMenuOptions"
          type="button"
          class="ds-menu__item"
          role="menuitem"
          (click)="selectRowGroupColumn(opt, $event)"
        >{{ opt.label }}</button>
      </ng-container>
      <ng-template #noRowGroupCols>
        <span class="ds-column-panel__picker-empty">All columns grouped</span>
      </ng-template>
    </div>
  </ng-container>

  <!-- ── 5. Values (optional — hidden by suppressValues) ─────────────── -->
  <ng-container *ngIf="!suppressValues">
    <div class="ds-divider" role="separator" aria-hidden="true"></div>
    <div class="ds-column-panel__section-hd">
      <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">functions</span>
      <span class="ds-column-panel__section-title">Values</span>
    </div>

    <!-- Active value rows -->
    <div
      *ngIf="activeValueColumns.length > 0"
      class="ds-column-panel__pivot-col-list"
    >
      <div
        *ngFor="let val of activeValueColumns"
        class="ds-column-panel__pivot-col-row"
      >
        <span class="ds-icon ds-icon--sm ds-column-panel__col-drag" aria-hidden="true">drag_indicator</span>
        <span class="ds-column-panel__col-name">{{ val.label }}</span>
        <button
          type="button"
          class="ds-column-panel__pivot-remove"
          [attr.aria-label]="'Remove ' + val.label + ' value column'"
          (click)="removeValueColumn(val.colId)"
        >
          <span class="ds-icon ds-icon--sm" aria-hidden="true">do_not_disturb_on</span>
        </button>
      </div>
    </div>

    <!-- Add Column button + inline picker -->
    <button
      type="button"
      class="ds-column-panel__add-btn"
      [attr.aria-expanded]="showValueMenu"
      (click)="toggleValueMenu($event)"
    >
      <span class="ds-icon ds-icon--sm" aria-hidden="true">add_circle_outline</span>
      Add Column
    </button>

    <div
      *ngIf="showValueMenu"
      class="ds-menu ds-column-panel__picker"
      role="menu"
      (click)="$event.stopPropagation()"
    >
      <ng-container *ngIf="valueMenuOptions.length > 0; else noValueCols">
        <button
          *ngFor="let opt of valueMenuOptions"
          type="button"
          class="ds-menu__item"
          role="menuitem"
          (click)="selectValueColumn(opt, $event)"
        >{{ opt.label }}</button>
      </ng-container>
      <ng-template #noValueCols>
        <span class="ds-column-panel__picker-empty">All columns added</span>
      </ng-template>
    </div>
  </ng-container>

</div>
