<div class="ds-column-panel" style="display: flex;">

  <!-- ── 1. Density toggle ───────────────────────────────────────── -->
  <div class="ds-column-panel__density">
    <div class="ds-density-toggle" role="group" aria-label="Row density">
      <button
        type="button"
        class="ds-density-toggle__btn"
        [class.is-selected]="density === 'comfort'"
        [attr.aria-pressed]="density === 'comfort'"
        (click)="onDensityChange('comfort')"
      >
        Comfort
      </button>
      <button
        type="button"
        class="ds-density-toggle__btn"
        [class.is-selected]="density === 'compact'"
        [attr.aria-pressed]="density === 'compact'"
        (click)="onDensityChange('compact')"
      >
        Compact
      </button>
    </div>
  </div>

  <!-- ── 2. Column Visibility ─────────────────────────────────────── -->
  <button
    type="button"
    class="ds-column-panel__section-hd"
    [attr.aria-expanded]="colVisibilityExpanded"
    (click)="toggleColVisibility()"
  >
    <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">visibility</span>
    <span class="ds-column-panel__section-title">Column Visibility</span>
    <span class="ds-icon ds-icon--sm ds-column-panel__expand-icon" aria-hidden="true">arrow_drop_down</span>
  </button>

  <div class="ds-column-panel__col-list">
    <div
      *ngFor="let col of columns; let i = index"
      class="ds-column-panel__col-row"
      [class.ds-column-panel__col-row--system]="col.system"
      [attr.draggable]="col.system ? null : 'true'"
      (dragstart)="onDragStart($event, i)"
      (dragover)="onDragOver($event)"
      (drop)="onDrop($event, i)"
    >
      <!-- Visibility checkbox -->
      <div
        class="ds-column-panel__col-checkbox"
        [class]="checkboxClass(col)"
        role="checkbox"
        [attr.aria-checked]="col.visible"
        [attr.aria-label]="'Toggle ' + col.label + ' visibility'"
        [attr.tabindex]="col.system ? -1 : 0"
        (click)="toggleColumnVisibility(col)"
        (keydown.space)="$event.preventDefault(); toggleColumnVisibility(col)"
        (keydown.enter)="toggleColumnVisibility(col)"
      >
        <span
          class="ds-icon ds-icon--sm"
          [class.ds-icon--filled]="col.visible"
          aria-hidden="true"
        >{{ checkboxIcon(col) }}</span>
      </div>

      <!-- Drag handle -->
      <span
        *ngIf="!col.system"
        class="ds-icon ds-icon--sm ds-column-panel__col-drag"
        aria-hidden="true"
      >drag_indicator</span>

      <!-- Column label -->
      <span class="ds-column-panel__col-name">{{ col.label }}</span>
    </div>
  </div>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <div class="ds-divider" role="separator" aria-hidden="true"></div>

  <!-- ── 3. Pivot Mode ────────────────────────────────────────────── -->
  <div class="ds-column-panel__pivot-row">
    <span class="ds-column-panel__pivot-label">Pivot Mode</span>
    <label class="ds-toggle" aria-label="Enable pivot mode">
      <input
        type="checkbox"
        class="ds-toggle__control"
        [checked]="pivotMode"
        (change)="togglePivotMode()"
      />
      <span class="ds-toggle__track"><span class="ds-toggle__thumb"></span></span>
    </label>
  </div>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <div class="ds-divider" role="separator" aria-hidden="true"></div>

  <!-- ── 4. Row Groups ────────────────────────────────────────────── -->
  <div class="ds-column-panel__section-hd">
    <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">drag_indicator</span>
    <span class="ds-column-panel__section-title">Row Groups</span>
  </div>
  <button
    type="button"
    class="ds-column-panel__add-btn"
    (click)="onAddRowGroupColumn()"
  >
    <span class="ds-icon ds-icon--sm" aria-hidden="true">add_circle_outline</span>
    Add Column
  </button>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <div class="ds-divider" role="separator" aria-hidden="true"></div>

  <!-- ── 5. Values ───────────────────────────────────────────────── -->
  <div class="ds-column-panel__section-hd">
    <span class="ds-icon ds-column-panel__section-icon" aria-hidden="true">functions</span>
    <span class="ds-column-panel__section-title">Values</span>
  </div>
  <button
    type="button"
    class="ds-column-panel__add-btn"
    (click)="onAddValueColumn()"
  >
    <span class="ds-icon ds-icon--sm" aria-hidden="true">add_circle_outline</span>
    Add Column
  </button>

</div>
