<div
  class="ds-dialog"
  [class.ds-dialog--center]="align === 'center'"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="titleId || null"
>
  <div class="ds-dialog__body">
    <ng-content select="[dialog-body]" />
  </div>

  @if (showDivider) {
    <div class="ds-dialog__divider" aria-hidden="true"></div>
  }

  <div class="ds-dialog__actions">
    <ng-content select="[dialog-actions]" />
  </div>
</div>
