<div *ngIf="visible" [class]="alertClasses" role="alert">
  <span class="ds-icon ds-alert__icon" aria-hidden="true">{{ iconName }}</span>

  <div class="ds-alert__content">
    <strong *ngIf="title" class="ds-alert__title">{{ title }}</strong>
    <p *ngIf="message" class="ds-alert__message">{{ message }}</p>
    <ng-content></ng-content>
    <button
      *ngIf="actionLabel"
      type="button"
      class="ds-alert__action"
      (click)="onAction()"
    >{{ actionLabel }}</button>
  </div>

  <button
    *ngIf="dismissible"
    type="button"
    class="ds-alert__dismiss"
    aria-label="Dismiss alert"
    (click)="onDismiss()"
  >
    <span class="ds-icon ds-icon--sm" aria-hidden="true">close</span>
  </button>
</div>
