<div [class]="wrapperClasses">

  <!-- Label -->
  <label *ngIf="label" class="ds-input__label" [for]="inputId">
    {{ label }}<span *ngIf="required" class="ds-input__required" aria-hidden="true">*</span>
  </label>

  <!-- Field wrapper -->
  <div class="ds-input__field">

    <!-- Leading icon -->
    <span *ngIf="leadingIcon" class="ds-icon ds-icon--sm ds-input__icon" aria-hidden="true">
      {{ leadingIcon }}
    </span>

    <!-- Prefix -->
    <span *ngIf="prefix" class="ds-input__prefix" aria-hidden="true">{{ prefix }}</span>

    <!-- Input control -->
    <input
      [id]="inputId"
      class="ds-input__control"
      [type]="type"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      [readOnly]="readOnly"
      [required]="required"
      [attr.aria-invalid]="isError ? 'true' : null"
      [attr.aria-describedby]="(helperText || errorText) ? inputId + '-helper' : null"
      (input)="onInput($event)"
    />

    <!-- Suffix -->
    <span *ngIf="suffix" class="ds-input__suffix" aria-hidden="true">{{ suffix }}</span>

    <!-- Trailing icon — clickable if trailingAction has listeners, otherwise decorative -->
    <button
      *ngIf="trailingIcon && !disabled"
      class="ds-input__action"
      type="button"
      [attr.aria-label]="'Clear ' + label"
      (click)="onTrailingAction()"
    >
      <span class="ds-icon ds-icon--sm" aria-hidden="true">{{ trailingIcon }}</span>
    </button>

    <span
      *ngIf="trailingIcon && disabled"
      class="ds-icon ds-icon--sm ds-input__icon"
      aria-hidden="true"
    >{{ trailingIcon }}</span>

  </div>

  <!-- Helper / error text -->
  <span
    *ngIf="isError && errorText || helperText"
    class="ds-input__helper"
    [id]="inputId + '-helper'"
    [attr.role]="isError ? 'alert' : null"
  >
    {{ isError && errorText ? errorText : helperText }}
  </span>

</div>
