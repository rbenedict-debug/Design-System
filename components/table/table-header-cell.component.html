<div
  class="ds-table-header-cell"
  [class.ds-table-header-cell--right]="align === 'right'"
>

  <!-- Left resize handle -->
  <div class="ds-table-header-cell__resize-handle">
    <span *ngIf="pipeLeft" class="ds-table-header-cell__resize-bar"></span>
  </div>

  <!-- Content: checkbox · icon slot · label · sort button -->
  <div
    class="ds-table-header-cell__content"
    [class.ds-table-header-cell__content--right]="align === 'right'"
  >
    <!-- Select-all checkbox -->
    <div
      *ngIf="checkbox"
      class="ds-table-header-cell__checkbox"
      [class]="checkboxClass"
    >
      <span class="ds-icon" [class.ds-icon--filled]="checked || indeterminate">
        {{ checkboxIcon }}
      </span>
    </div>

    <!-- Column label -->
    <span *ngIf="label" class="ds-table-header-cell__label">{{ label }}</span>

    <!-- Sort button -->
    <button
      *ngIf="sorting"
      type="button"
      class="ds-table-header-cell__icon-btn"
      [ngClass]="sortBtnClass"
      (click)="onSortClick($event)"
      [attr.aria-label]="'Sort: ' + (sortDirection ?? 'none')"
    >
      <span class="ds-icon">{{ sortIcon }}</span>
    </button>
  </div>

  <!-- Trailing actions: menu · filter · right resize pipe -->
  <div class="ds-table-header-cell__actions">
    <!-- Column menu button -->
    <button
      *ngIf="menuControl"
      #menuBtn
      type="button"
      class="ds-table-header-cell__icon-btn ds-table-header-cell__icon-btn--active"
      (click)="onMenuClick(menuBtn)"
      aria-label="Column options"
    >
      <span class="ds-icon">more_vert</span>
    </button>

    <!-- Filter button -->
    <button
      *ngIf="filtering"
      type="button"
      class="ds-table-header-cell__icon-btn"
      aria-label="Filter column"
    >
      <span class="ds-icon">filter_alt</span>
    </button>

    <!-- Right resize pipe -->
    <div class="ds-table-header-cell__resize-handle ds-table-header-cell__resize-handle--trailing">
      <span *ngIf="pipeRight" class="ds-table-header-cell__resize-bar"></span>
    </div>
  </div>

</div>
