name: Release

# Fires when a version tag is pushed (e.g. v0.2.1).
# Creates a GitHub Release using the CHANGELOG section for the tag as the body.
# This repo is public and consumers install directly via:
#   npm install github:rbenedict-debug/Design-System#vX.Y.Z
# There is no npm publish step — the git tag IS the release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Pull the section between "## [VERSION]" and the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for $TAG — using a placeholder." >&2
            echo "Release $TAG. See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
